name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build lzfse
        run: gcc -O2 -o lzfse src/lzfse_*.c src/lzvn_*.c -Isrc
        working-directory: _tools/lzfse

      - name: Build
        run: go build -o car_unpacker .

      - name: Run on test file
        run: ./car_unpacker test_fixtures/timac_demo.car test_output

      - name: Verify output
        run: |
          ls -la test_output/
          echo "Output directory created successfully"
